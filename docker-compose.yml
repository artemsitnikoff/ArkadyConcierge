services:
  concierge:
    build: .
    ports:
      - "8003:8003"
    env_file:
      - .env
    volumes:
      # Share the Claude OAuth token file with ArkadyJarvis on the same host.
      # Anthropic refresh tokens are single-use — two bots with separate
      # copies of the file invalidate each other's tokens. Pointing both
      # containers at the same host dir (`~/ArkadyJarvis/data`) lets them
      # read/write one source of truth.
      - ../ArkadyJarvis/data:/app/data
      - ./prompts:/app/prompts
      - ./.env:/app/.env:ro
    restart: unless-stopped
